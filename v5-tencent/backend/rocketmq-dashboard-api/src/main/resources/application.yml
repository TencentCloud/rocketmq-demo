server:
  port: 8080

spring:
  application:
    name: rocketmq-dashboard

# Tencent Cloud credentials configuration
# Configure via one of the following methods:
#   1. Set values directly below
#   2. Environment variables: TENCENT_CLOUD_SECRET_ID, TENCENT_CLOUD_SECRET_KEY, TENCENT_CLOUD_REGION
#   3. JVM -D parameters: -Dtencent.cloud.secret-id=xxx -Dtencent.cloud.secret-key=xxx -Dtencent.cloud.region=ap-guangzhou
tencent:
  cloud:
    secret-id: ${TENCENT_CLOUD_SECRET_ID:}
    secret-key: ${TENCENT_CLOUD_SECRET_KEY:}
    region: ${TENCENT_CLOUD_REGION:ap-guangzhou}
    endpoint: ${TENCENT_CLOUD_ENDPOINT:trocket.tencentcloudapi.com}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

logging:
  level:
    com.rocketmq.dashboard: INFO
    com.tencentcloudapi: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
